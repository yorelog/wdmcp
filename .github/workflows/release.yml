name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin
            arch: amd64
          - target: aarch64-apple-darwin
            os: macos-14
            platform: darwin
            arch: arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch: arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows
            arch: amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            platform: windows
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ARCHIVE="browsectl-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar -czf "../../../${ARCHIVE}" browsectl
          cd ../../..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $ARCHIVE = "browsectl-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/browsectl.exe" -DestinationPath $ARCHIVE
          echo "ARCHIVE=${ARCHIVE}" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: browsectl-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [VERSION]" until the next "## [" or end of file
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi

          # Write to file for the release action (avoids delimiter issues)
          echo "$NOTES" > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release-notes.md
          name: v${{ steps.version.outputs.VERSION }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public
